<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="leafGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5d06e"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </radialGradient>
  </defs>

  <!-- Left branch -->
  <g transform="translate(50,50)">
    <!-- Left leaves -->
    <ellipse cx="-36" cy="4" rx="9" ry="4" fill="#C9A84C" transform="rotate(-30 -36 4)" opacity="0.95"/>
    <ellipse cx="-33" cy="-8" rx="9" ry="4" fill="#C9A84C" transform="rotate(-50 -33 -8)" opacity="0.95"/>
    <ellipse cx="-26" cy="-19" rx="9" ry="4" fill="#D4AF37" transform="rotate(-70 -26 -19)" opacity="0.95"/>
    <ellipse cx="-15" cy="-28" rx="9" ry="4" fill="#D4AF37" transform="rotate(-90 -15 -28)" opacity="0.95"/>
    <ellipse cx="-3" cy="-33" rx="9" ry="4" fill="#C9A84C" transform="rotate(-110 -3 -33)" opacity="0.95"/>

    <ellipse cx="-38" cy="16" rx="8" ry="3.5" fill="#b8860b" transform="rotate(-15 -38 16)" opacity="0.85"/>
    <ellipse cx="-37" cy="-3" rx="8" ry="3.5" fill="#b8860b" transform="rotate(-40 -37 -3)" opacity="0.85"/>
    <ellipse cx="-31" cy="-14" rx="8" ry="3.5" fill="#b8860b" transform="rotate(-60 -31 -14)" opacity="0.85"/>
    <ellipse cx="-22" cy="-24" rx="8" ry="3.5" fill="#b8860b" transform="rotate(-80 -22 -24)" opacity="0.85"/>
    <ellipse cx="-9" cy="-31" rx="8" ry="3.5" fill="#b8860b" transform="rotate(-100 -9 -31)" opacity="0.85"/>

    <!-- Right leaves (mirrored) -->
    <ellipse cx="36" cy="4" rx="9" ry="4" fill="#C9A84C" transform="rotate(30 36 4)" opacity="0.95"/>
    <ellipse cx="33" cy="-8" rx="9" ry="4" fill="#C9A84C" transform="rotate(50 33 -8)" opacity="0.95"/>
    <ellipse cx="26" cy="-19" rx="9" ry="4" fill="#D4AF37" transform="rotate(70 26 -19)" opacity="0.95"/>
    <ellipse cx="15" cy="-28" rx="9" ry="4" fill="#D4AF37" transform="rotate(90 15 -28)" opacity="0.95"/>
    <ellipse cx="3" cy="-33" rx="9" ry="4" fill="#C9A84C" transform="rotate(110 3 -33)" opacity="0.95"/>

    <ellipse cx="38" cy="16" rx="8" ry="3.5" fill="#b8860b" transform="rotate(15 38 16)" opacity="0.85"/>
    <ellipse cx="37" cy="-3" rx="8" ry="3.5" fill="#b8860b" transform="rotate(40 37 -3)" opacity="0.85"/>
    <ellipse cx="31" cy="-14" rx="8" ry="3.5" fill="#b8860b" transform="rotate(60 31 -14)" opacity="0.85"/>
    <ellipse cx="22" cy="-24" rx="8" ry="3.5" fill="#b8860b" transform="rotate(80 22 -24)" opacity="0.85"/>
    <ellipse cx="9" cy="-31" rx="8" ry="3.5" fill="#b8860b" transform="rotate(100 9 -31)" opacity="0.85"/>

    <!-- Bottom knot / ribbon -->
    <ellipse cx="-5" cy="36" rx="5" ry="3" fill="#C9A84C" transform="rotate(-20 -5 36)" opacity="0.9"/>
    <ellipse cx="5" cy="36" rx="5" ry="3" fill="#C9A84C" transform="rotate(20 5 36)" opacity="0.9"/>
    <circle cx="0" cy="36" r="3.5" fill="#D4AF37" opacity="0.95"/>
  </g>
</svg>
