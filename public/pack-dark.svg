<svg xmlns="http://www.w3.org/2000/svg" width="180" height="270" viewBox="0 0 180 270">
  <defs>
    <linearGradient id="bg-dark" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#1a0808"/>
      <stop offset="100%" stop-color="#0d0404"/>
    </linearGradient>
    <radialGradient id="glow-dark" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ember-dark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="40%" stop-color="#EF4444" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="270" rx="10" fill="url(#bg-dark)"/>
  <rect width="180" height="270" rx="10" fill="url(#glow-dark)"/>
  <!-- Crack veins -->
  <path d="M90,50 L85,85 L78,95 L82,130" stroke="#EF4444" stroke-width="0.6" fill="none" opacity="0.25"/>
  <path d="M90,50 L95,85 L102,95 L98,130" stroke="#EF4444" stroke-width="0.6" fill="none" opacity="0.25"/>
  <path d="M82,130 L70,140" stroke="#EF4444" stroke-width="0.5" fill="none" opacity="0.2"/>
  <path d="M98,130 L110,140" stroke="#EF4444" stroke-width="0.5" fill="none" opacity="0.2"/>
  <!-- Outer border -->
  <rect x="4" y="4" width="172" height="262" rx="8" fill="none" stroke="#EF4444" stroke-width="1.5" opacity="0.7"/>
  <!-- Inner border -->
  <rect x="9" y="9" width="162" height="252" rx="6" fill="none" stroke="#EF4444" stroke-width="0.5" opacity="0.3"/>
  <!-- Central infernal symbol -->
  <circle cx="90" cy="112" r="38" fill="url(#ember-dark)" opacity="0.75"/>
  <circle cx="90" cy="112" r="25" fill="none" stroke="#EF4444" stroke-width="1.2" opacity="0.6"/>
  <!-- Dark rune - inverted crown/skull-like shape -->
  <g transform="translate(90,112)" fill="#EF4444" opacity="0.55">
    <!-- Central downward point -->
    <polygon points="0,20 -6,6 6,6"/>
    <!-- Wings -->
    <polygon points="-20,-2 -12,-10 -10,2"/>
    <polygon points="20,-2 12,-10 10,2"/>
    <!-- Central bar -->
    <rect x="-8" y="-4" width="16" height="3" rx="1"/>
  </g>
  <!-- Flames/energy spikes outward -->
  <g transform="translate(90,112)" stroke="#EF4444" stroke-width="1.2" fill="none" opacity="0.5">
    <line x1="0" y1="-38" x2="0" y2="-28"/>
    <line x1="0" y1="28" x2="0" y2="38"/>
    <line x1="-38" y1="0" x2="-28" y2="0"/>
    <line x1="28" y1="0" x2="38" y2="0"/>
    <line x1="-27" y1="-27" x2="-21" y2="-21"/>
    <line x1="21" y1="-21" x2="27" y2="-27"/>
    <line x1="-27" y1="27" x2="-21" y2="21"/>
    <line x1="21" y1="21" x2="27" y2="27"/>
  </g>
  <!-- Ember particles -->
  <circle cx="70" cy="82" r="1.5" fill="#EF4444" opacity="0.4"/>
  <circle cx="115" cy="90" r="1" fill="#EF4444" opacity="0.3"/>
  <circle cx="60" cy="135" r="1" fill="#EF4444" opacity="0.35"/>
  <circle cx="125" cy="128" r="1.5" fill="#EF4444" opacity="0.3"/>
  <!-- Corner flourishes -->
  <path d="M18,18 L30,18 M18,18 L18,30" stroke="#EF4444" stroke-width="1" opacity="0.5" fill="none"/>
  <path d="M162,18 L150,18 M162,18 L162,30" stroke="#EF4444" stroke-width="1" opacity="0.5" fill="none"/>
  <path d="M18,252 L30,252 M18,252 L18,240" stroke="#EF4444" stroke-width="1" opacity="0.5" fill="none"/>
  <path d="M162,252 L150,252 M162,252 L162,240" stroke="#EF4444" stroke-width="1" opacity="0.5" fill="none"/>
  <!-- GRIDHOLM text -->
  <text x="90" y="48" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#EF4444" opacity="0.5" letter-spacing="3">GRIDHOLM</text>
  <!-- Faction label -->
  <rect x="20" y="192" width="140" height="34" rx="4" fill="#EF4444" opacity="0.06"/>
  <text x="90" y="214" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#EF4444" font-weight="bold" letter-spacing="2" opacity="0.9">DARK</text>
  <text x="90" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#C9A84C" opacity="0.8" letter-spacing="1.5">FACTION PACK</text>
</svg>
