<svg xmlns="http://www.w3.org/2000/svg" width="180" height="270" viewBox="0 0 180 270">
  <defs>
    <linearGradient id="bg-light" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#1a1510"/>
      <stop offset="100%" stop-color="#0d0b07"/>
    </linearGradient>
    <radialGradient id="glow-light" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#F0E6D2" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#F0E6D2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sun-light" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffbe8"/>
      <stop offset="50%" stop-color="#F0E6D2" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#F0E6D2" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="270" rx="10" fill="url(#bg-light)"/>
  <!-- Glow overlay -->
  <rect width="180" height="270" rx="10" fill="url(#glow-light)"/>
  <!-- Subtle texture lines -->
  <line x1="0" y1="30" x2="180" y2="30" stroke="#F0E6D2" stroke-width="0.3" opacity="0.12"/>
  <line x1="0" y1="60" x2="180" y2="60" stroke="#F0E6D2" stroke-width="0.3" opacity="0.08"/>
  <line x1="0" y1="90" x2="180" y2="90" stroke="#F0E6D2" stroke-width="0.3" opacity="0.08"/>
  <line x1="0" y1="120" x2="180" y2="120" stroke="#F0E6D2" stroke-width="0.3" opacity="0.08"/>
  <line x1="0" y1="150" x2="180" y2="150" stroke="#F0E6D2" stroke-width="0.3" opacity="0.08"/>
  <line x1="0" y1="180" x2="180" y2="180" stroke="#F0E6D2" stroke-width="0.3" opacity="0.08"/>
  <!-- Outer border -->
  <rect x="4" y="4" width="172" height="262" rx="8" fill="none" stroke="#F0E6D2" stroke-width="1.5" opacity="0.7"/>
  <!-- Inner border -->
  <rect x="9" y="9" width="162" height="252" rx="6" fill="none" stroke="#F0E6D2" stroke-width="0.5" opacity="0.3"/>
  <!-- Sun / radiance symbol -->
  <circle cx="90" cy="115" r="38" fill="url(#sun-light)" opacity="0.9"/>
  <!-- Sun rays -->
  <g transform="translate(90,115)" stroke="#F0E6D2" stroke-width="1.5" opacity="0.6">
    <line x1="0" y1="-52" x2="0" y2="-44"/>
    <line x1="0" y1="44" x2="0" y2="52"/>
    <line x1="-52" y1="0" x2="-44" y2="0"/>
    <line x1="44" y1="0" x2="52" y2="0"/>
    <line x1="-37" y1="-37" x2="-31" y2="-31"/>
    <line x1="31" y1="-31" x2="37" y2="-37"/>
    <line x1="-37" y1="37" x2="-31" y2="31"/>
    <line x1="31" y1="31" x2="37" y2="37"/>
  </g>
  <!-- Inner sun circle -->
  <circle cx="90" cy="115" r="22" fill="none" stroke="#F0E6D2" stroke-width="1.2" opacity="0.7"/>
  <circle cx="90" cy="115" r="10" fill="#F0E6D2" opacity="0.5"/>
  <!-- Geometric diamond accents -->
  <polygon points="90,68 96,74 90,80 84,74" fill="none" stroke="#F0E6D2" stroke-width="1" opacity="0.5"/>
  <polygon points="90,150 96,156 90,162 84,156" fill="none" stroke="#F0E6D2" stroke-width="1" opacity="0.5"/>
  <!-- Corner flourishes -->
  <path d="M18,18 L30,18 M18,18 L18,30" stroke="#F0E6D2" stroke-width="1" opacity="0.5" fill="none"/>
  <path d="M162,18 L150,18 M162,18 L162,30" stroke="#F0E6D2" stroke-width="1" opacity="0.5" fill="none"/>
  <path d="M18,252 L30,252 M18,252 L18,240" stroke="#F0E6D2" stroke-width="1" opacity="0.5" fill="none"/>
  <path d="M162,252 L150,252 M162,252 L162,240" stroke="#F0E6D2" stroke-width="1" opacity="0.5" fill="none"/>
  <!-- GRIDHOLM text -->
  <text x="90" y="48" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#F0E6D2" opacity="0.5" letter-spacing="3">GRIDHOLM</text>
  <!-- Faction label area background -->
  <rect x="20" y="192" width="140" height="34" rx="4" fill="#F0E6D2" opacity="0.06"/>
  <!-- Faction name -->
  <text x="90" y="214" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#F0E6D2" font-weight="bold" letter-spacing="2" opacity="0.9">LIGHT</text>
  <!-- Subtitle -->
  <text x="90" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#C9A84C" opacity="0.8" letter-spacing="1.5">FACTION PACK</text>
</svg>
