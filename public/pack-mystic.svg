<svg xmlns="http://www.w3.org/2000/svg" width="180" height="270" viewBox="0 0 180 270">
  <defs>
    <linearGradient id="bg-mystic" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#110a1a"/>
      <stop offset="100%" stop-color="#08050e"/>
    </linearGradient>
    <radialGradient id="glow-mystic" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-mystic" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="50%" stop-color="#A855F7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="270" rx="10" fill="url(#bg-mystic)"/>
  <rect width="180" height="270" rx="10" fill="url(#glow-mystic)"/>
  <!-- Star field -->
  <circle cx="30" cy="40" r="1" fill="#A855F7" opacity="0.6"/>
  <circle cx="150" cy="55" r="1.5" fill="#A855F7" opacity="0.5"/>
  <circle cx="65" cy="30" r="1" fill="#A855F7" opacity="0.4"/>
  <circle cx="130" cy="75" r="1" fill="#A855F7" opacity="0.4"/>
  <circle cx="45" cy="170" r="1" fill="#A855F7" opacity="0.3"/>
  <circle cx="155" cy="155" r="1" fill="#A855F7" opacity="0.3"/>
  <circle cx="25" cy="125" r="1.5" fill="#A855F7" opacity="0.4"/>
  <!-- Outer border -->
  <rect x="4" y="4" width="172" height="262" rx="8" fill="none" stroke="#A855F7" stroke-width="1.5" opacity="0.7"/>
  <!-- Inner border -->
  <rect x="9" y="9" width="162" height="252" rx="6" fill="none" stroke="#A855F7" stroke-width="0.5" opacity="0.3"/>
  <!-- Arcane circle -->
  <circle cx="90" cy="112" r="40" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.4"/>
  <circle cx="90" cy="112" r="28" fill="url(#orb-mystic)" opacity="0.85"/>
  <circle cx="90" cy="112" r="18" fill="none" stroke="#A855F7" stroke-width="0.8" opacity="0.5"/>
  <!-- Star/rune in center -->
  <g transform="translate(90,112)" stroke="#A855F7" stroke-width="1.2" fill="none" opacity="0.8">
    <line x1="0" y1="-14" x2="0" y2="14"/>
    <line x1="-14" y1="0" x2="14" y2="0"/>
    <line x1="-10" y1="-10" x2="10" y2="10"/>
    <line x1="10" y1="-10" x2="-10" y2="10"/>
  </g>
  <!-- Orbit ring ticks -->
  <g transform="translate(90,112)" stroke="#A855F7" stroke-width="1" opacity="0.4">
    <line x1="0" y1="-40" x2="0" y2="-34"/>
    <line x1="0" y1="34" x2="0" y2="40"/>
    <line x1="-40" y1="0" x2="-34" y2="0"/>
    <line x1="34" y1="0" x2="40" y2="0"/>
    <line x1="-28" y1="-28" x2="-24" y2="-24"/>
    <line x1="24" y1="-24" x2="28" y2="-28"/>
    <line x1="-28" y1="28" x2="-24" y2="24"/>
    <line x1="24" y1="24" x2="28" y2="28"/>
  </g>
  <!-- Corner flourishes -->
  <path d="M18,18 L30,18 M18,18 L18,30" stroke="#A855F7" stroke-width="1" opacity="0.5" fill="none"/>
  <path d="M162,18 L150,18 M162,18 L162,30" stroke="#A855F7" stroke-width="1" opacity="0.5" fill="none"/>
  <path d="M18,252 L30,252 M18,252 L18,240" stroke="#A855F7" stroke-width="1" opacity="0.5" fill="none"/>
  <path d="M162,252 L150,252 M162,252 L162,240" stroke="#A855F7" stroke-width="1" opacity="0.5" fill="none"/>
  <!-- GRIDHOLM text -->
  <text x="90" y="48" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#A855F7" opacity="0.5" letter-spacing="3">GRIDHOLM</text>
  <!-- Faction label -->
  <rect x="20" y="192" width="140" height="34" rx="4" fill="#A855F7" opacity="0.06"/>
  <text x="90" y="214" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#A855F7" font-weight="bold" letter-spacing="2" opacity="0.9">MYSTIC</text>
  <text x="90" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#C9A84C" opacity="0.8" letter-spacing="1.5">FACTION PACK</text>
</svg>
