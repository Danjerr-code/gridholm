<svg xmlns="http://www.w3.org/2000/svg" width="180" height="270" viewBox="0 0 180 270">
  <defs>
    <linearGradient id="bg-primal" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#091a0d"/>
      <stop offset="100%" stop-color="#050d07"/>
    </linearGradient>
    <radialGradient id="glow-primal" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core-primal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="60%" stop-color="#22C55E" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="270" rx="10" fill="url(#bg-primal)"/>
  <rect width="180" height="270" rx="10" fill="url(#glow-primal)"/>
  <!-- Outer border -->
  <rect x="4" y="4" width="172" height="262" rx="8" fill="none" stroke="#22C55E" stroke-width="1.5" opacity="0.7"/>
  <!-- Inner border -->
  <rect x="9" y="9" width="162" height="252" rx="6" fill="none" stroke="#22C55E" stroke-width="0.5" opacity="0.3"/>
  <!-- Organic vein lines -->
  <path d="M90,50 Q70,80 80,110 Q90,130 85,160" stroke="#22C55E" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M90,50 Q110,80 100,110 Q90,130 95,160" stroke="#22C55E" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M55,90 Q75,100 80,115" stroke="#22C55E" stroke-width="0.6" fill="none" opacity="0.2"/>
  <path d="M125,90 Q105,100 100,115" stroke="#22C55E" stroke-width="0.6" fill="none" opacity="0.2"/>
  <!-- Central primal symbol - leaf/tree -->
  <circle cx="90" cy="112" r="36" fill="url(#core-primal)" opacity="0.8"/>
  <circle cx="90" cy="112" r="24" fill="none" stroke="#22C55E" stroke-width="1.2" opacity="0.6"/>
  <!-- Tree shape -->
  <path d="M90,82 L78,100 L82,100 L72,118 L78,118 L68,136 L90,136 L112,136 L102,118 L108,118 L98,100 L102,100 Z" fill="#22C55E" opacity="0.5"/>
  <line x1="90" y1="136" x2="90" y2="150" stroke="#22C55E" stroke-width="2" opacity="0.5"/>
  <!-- Leaf accents -->
  <ellipse cx="60" cy="100" rx="8" ry="4" fill="#22C55E" opacity="0.3" transform="rotate(-30,60,100)"/>
  <ellipse cx="120" cy="100" rx="8" ry="4" fill="#22C55E" opacity="0.3" transform="rotate(30,120,100)"/>
  <!-- Corner flourishes -->
  <path d="M18,18 L30,18 M18,18 L18,30" stroke="#22C55E" stroke-width="1" opacity="0.5" fill="none"/>
  <path d="M162,18 L150,18 M162,18 L162,30" stroke="#22C55E" stroke-width="1" opacity="0.5" fill="none"/>
  <path d="M18,252 L30,252 M18,252 L18,240" stroke="#22C55E" stroke-width="1" opacity="0.5" fill="none"/>
  <path d="M162,252 L150,252 M162,252 L162,240" stroke="#22C55E" stroke-width="1" opacity="0.5" fill="none"/>
  <!-- GRIDHOLM text -->
  <text x="90" y="48" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#22C55E" opacity="0.5" letter-spacing="3">GRIDHOLM</text>
  <!-- Faction label -->
  <rect x="20" y="192" width="140" height="34" rx="4" fill="#22C55E" opacity="0.06"/>
  <text x="90" y="214" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#22C55E" font-weight="bold" letter-spacing="2" opacity="0.9">PRIMAL</text>
  <text x="90" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#C9A84C" opacity="0.8" letter-spacing="1.5">FACTION PACK</text>
</svg>
